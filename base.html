<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Library Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        body{
            background:#f5f7fb;
            font-family:Arial, sans-serif;
        }

        .navbar{
            background:linear-gradient(to right,#141e30,#243b55);
        }

        .navbar-brand{
            font-size:28px;
            font-weight:bold;
        }

        .nav-link{
            color:white !important;
            margin-right:15px;
            font-size:17px;
        }

        .hero{
            background:linear-gradient(to right,#7c47a5,#214b6f);
            color:white;
            padding:70px;
            border-radius:20px; 
            text-align:center;
            margin-top:30px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.2);
        }

        .card{
            border:none;
            border-radius:20px;
            transition:0.3s;
            box-shadow:0px 4px 15px rgba(0,0,0,0.1);
        }

        .card:hover{
            transform:translateY(-10px);
        }

        .btn-custom{
            border-radius:30px;
            padding:10px 20px;
        }

        footer{
            margin-top:60px;
            background:#141e30;
            color:white;
            padding:20px;
            text-align:center;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">

    <div class="container">

        <a class="navbar-brand" href="/">
            <i class="fa-solid fa-book"></i>
            Library System
        </a>

        <div>

            <a href="/" class="nav-link d-inline">
                Home
            </a>

            <a href="/books/" class="nav-link d-inline">
                Books
            </a>

            <a href="/students/" class="nav-link d-inline">
                Students
            </a>

            <a href="/add-book/" class="nav-link d-inline">
                Add Book
            </a>

            <a href="/add-student/" class="nav-link d-inline">
                Add Student
            </a>

            <a href="/issue-book/" class="nav-link d-inline">
                Issue Book
            </a>

        </div>

    </div>

</nav>

<div class="container">

    {% block content %}

    {% endblock %}

</div>

<footer>

    <h5>
        Library Management System
    </h5>

    <p>
        Internship Project using Django
    </p>

</footer>

</body>

</html>
