    {% extends 'base.html' %}

    {% block content %}
    <!DOCTYPE html>
    <html>

    <head>

        <title>Add Book</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    </head>

    <body>

    <div class="container mt-5">

        <h1 class="mb-4">
            Add Book
        </h1>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">
                Save Book
            </button>

        </form>

    </div>

    </body>

    </html>
    {% endblock %}
