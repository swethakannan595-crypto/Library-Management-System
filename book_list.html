{% extends 'base.html' %}

{% block content %}
<!DOCTYPE html>
<html>

<head>

    <title>Books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1 class="text-center mb-4">
        Book List
    </h1>
    <form method="GET" class="mb-4">

    <input type="text"
           name="q"
           class="form-control"
           placeholder="Search books by title">

</form>

    <table class="table table-bordered table-striped">

        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Quantity</th>
            <th>Actions</th>
        </tr>

        {% for book in books %}

        <tr>

            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.quantity }}</td>

        </tr>

        <td>

    <a href="/edit-book/{{ book.id }}" class="btn btn-warning btn-sm">
        Edit
    </a>

    <a href="/delete-book/{{ book.id }}" class="btn btn-danger btn-sm">
        Delete
    </a>

</td>

        {% endfor %}

    </table>

</div>

</body>

</html>
{% endblock %}
